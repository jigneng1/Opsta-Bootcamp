apiVersion: opentelemetry.io/v1alpha1
kind: Instrumentation
metadata:
  name: my-instrumentation
  namespace: bookinfo-dev
spec:
  exporter:
    endpoint: http://tempo.monitoring.svc.cluster.local:4318
  sampler:
    type: always_on
  python:
    image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-python:0.54b1
  nodejs:
    image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-nodejs:0.41.1
  java:
    image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-java:1.33.6
  # ruby:
  #   image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-ruby:0.7.0
spec:
  template:
    spec:
      volumes:
        - name: otel-ruby-libs
          emptyDir: {}
      initContainers:
        - name: otel-ruby-injector
          image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-ruby:0.7.0
          command: ["sh", "-c", "cp -a /autoinstrumentation/. /otel-ruby/"]
          volumeMounts:
            - name: otel-ruby-libs
              mountPath: /otel-ruby
      containers:
        - name: details
          image: registry-neng.stthi.com/bookinfo/details:dev
          volumeMounts:
            - name: otel-ruby-libs
              mountPath: /otel-ruby
          env:
            - name: RUBYLIB
              value: /otel-ruby/lib
            - name: RUBYOPT
              value: -ropentelemetry/autoinstrumentation
            - name: OTEL_SERVICE_NAME
              value: details
            - name: OTEL_TRACES_EXPORTER
              value: otlp
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://tempo.monitoring.svc.cluster.local:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf